name: Code Quality & Coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality:
    name: Lint, Format & Test
    runs-on: ubuntu-latest

    steps:
      # 1. Fetch the repository codebase
      - name: Checkout Code
        uses: actions/checkout@v7

      # 2. Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm' # Automatically caches node_modules for faster runs

      # 3. Install project dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Check formatting (Prettier)
      # This checks if code matches your style rules without altering files
      - name: Check Code Formatting
        run: npm run format:check --if-present

      # 5. Run Linter (ESLint)
      # This catches syntax bugs, unused variables, and code smells
      - name: Run Linter
        run: npm run lint --if-present

      # 6. Run Tests with Coverage
      # This runs your test suite and generates a coverage report
      - name: Run Tests & Coverage
        run: npm test -- --coverage --watchAll=false --passWithNoTests
